#import './Credentials.graphql'

fragment basicVersionFields on Version {
  _id
  createdAt
  message
  owner {
    ...basicPublicUserFields
  }
  type
  revision
  version
}

fragment articleVersionFields on Version {
  name
  md
  bib
  bibliography {
    authorName
    date
    entry
    key
    title
    type
  }
  yaml(options: { strip_markdown: true })
}

fragment basicArticleFields on Article {
  _id
  owner {
    ...basicPublicUserFields
  }
  title
  updatedAt
}

fragment editableArticleFields on Article {
  contributors {
    user {
      ...basicPublicUserFields
    }
  }

  versions {
    ...basicVersionFields
  }

  workingVersion {
    md
    bib
    bibliography {
      authorName
      date
      entry
      key
      title
      type
    }
    yaml(options: { strip_markdown: true })
  }

  zoteroLink
  nakalaLink
}

fragment previewArticleFields on Article {
  # actually, as we do not request new article data when switching from WRITE to PREVIEW
  # we skip this data fetching optimization for now
  # css @include(if: $isPreview)
  preview {
    stylesheet
    template
  }
}

mutation updateArticle($updateArticleInput: UpdateArticleInput!) {
  updateArticle(updateArticleInput: $updateArticleInput) {
    _id
    title
    tags {
      _id
      name
      color
    }
  }
}

mutation setArticleZoteroLink($articleId: ID!, $url: String!) {
  setArticleZoteroLink(articleId: $articleId, zotero: $url)
}

mutation setArticleNakalaLink($articleId: ID!, $url: String!) {
  setArticleNakalaLink(articleId: $articleId, nakala: $url)
}

query getArticleVersions($articleId: ID!) {
  article(article: $articleId) {
    versions {
      ...basicVersionFields
    }
  }
}

query getArticleWorkspaces($articleId: ID!) {
  article(article: $articleId) {
    workspaces {
      _id
      color
      name
    }
  }
}

query getArticleContributors($articleId: ID!) {
  article(article: $articleId) {
    contributors {
      user {
        ...extendedPublicUserFields
      }
    }
  }
}

mutation deleteArticle($articleId: ID!) {
  deleteArticle(articleId: $articleId)
}

mutation duplicateArticle($user: ID, $articleId: ID!, $to: ID!) {
  duplicateArticle(article: $articleId, to: $to, user: $user) {
    _id
    title
    createdAt
    updatedAt
  }
}

mutation updateArticleBibliography($input: UpdateArticleBibliographyInput!) {
  updateArticleBibliography(input: $input) {
    authorName
    date
    entry
    key
    title
    type
  }
}

mutation addArticleTags($articleId: ID!, $tags: [ID]!) {
  addArticleTags(articleId: $articleId, tags: $tags) {
    _id
    name
    color
  }
}

mutation removeArticleTags($articleId: ID!, $tags: [ID]!) {
  removeArticleTags(articleId: $articleId, tags: $tags) {
    _id
    name
    color
  }
}

query getArticleInfo($articleId: ID!) {
  article(article: $articleId) {
    title

    workingVersion {
      bibPreview
    }
  }
}

query getArticleTags($articleId: ID!) {
  article(article: $articleId) {
    tags {
      _id
      name
      color
    }
  }
}

mutation updateArticleWorkingVersion(
  $articleId: ID!
  $content: WorkingVersionInput!
) {
  updateArticleWorkingVersion(articleId: $articleId, content: $content) {
    updatedAt
  }
}

query getArticleMetadata(
  $articleId: ID!
  $versionId: ID!
  $hasVersion: Boolean!
) {
  article(article: $articleId) {
    _id

    workingVersion {
      metadata
      metadataFormType
    }

    workspaces {
      formMetadata {
        data
        ui
      }
    }
  }

  version(version: $versionId) @include(if: $hasVersion) {
    metadata
    metadataFormType
  }
}

query getArticle($id: ID!, $version: ID!, $hasVersion: Boolean!) {
  article(article: $id) {
    ...basicArticleFields
    ...editableArticleFields
    ...previewArticleFields
  }

  version(version: $version) @include(if: $hasVersion) {
    ...articleVersionFields
  }
}

query getArticlePreview($id: ID!, $version: ID!, $hasVersion: Boolean!) {
  sharedArticle(article: $id) {
    ...basicArticleFields
    ...editableArticleFields
    ...previewArticleFields
  }

  version(version: $version) @include(if: $hasVersion) {
    ...articleVersionFields
  }
}

query getEditableArticle($article: ID!, $hasVersion: Boolean!, $version: ID!) {
  article(article: $article) {
    ...basicArticleFields
    ...editableArticleFields
    ...previewArticleFields

    workingVersion {
      bibPreview
    }
  }

  version(version: $version) @include(if: $hasVersion) {
    ...basicVersionFields
    ...articleVersionFields
    bibPreview
  }
}
